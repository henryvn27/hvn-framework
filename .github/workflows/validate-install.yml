name: Validate Install

on:
  push:
  pull_request:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Global install
        run: |
          ./install/install.sh --mode global --target /tmp/orca-global
          ./install/verify-install.sh --target /tmp/orca-global
          ./install/doctor.sh --target /tmp/orca-global --services github
